<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>বেলতার ভূমি | Beltar Bhumi</title>
  <meta name="description" content="বেলতার ভূমি — আপনার নিজের ভূমির গল্প, ইতিহাস এবং ঐতিহ্য।" />

  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      overflow: auto;
    }
  </style>
</head>
<body>
  <!--
    SANDBOX PERMISSIONS EXPLAINED:
    ─────────────────────────────────────────────────────────────
    allow-same-origin          → Site can access its own cookies/storage
    allow-scripts              → JavaScript runs normally
    allow-forms                → Forms can be submitted
    allow-popups               → window.open() and target="_blank" work
    allow-popups-to-escape-sandbox → Popups open as NORMAL tabs (not sandboxed)
                                     ★ THIS FIXES WhatsApp/Facebook links ★
                                     They open in a new tab instead of iframe
    allow-top-navigation-by-user-activation → On user click, links can navigate
                                               the main page (escape iframe)
    ─────────────────────────────────────────────────────────────
  -->
  <iframe
    id="mainFrame"
    src="https://anabrata.github.io/Mampibiswas/"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
    loading="eager"
    referrerpolicy="no-referrer"
    allowfullscreen
  ></iframe>
</body>
</html>
